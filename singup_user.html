<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/singupstyle.css">
</head>
<body>
    <div class="bodycenter">
        <p class="mainheading"><b>Singup Form</b></p>

        <div class="user-info">
        <input  id="username" type="text" required>
        <span>User Name</span>
        </div>

         <div class="user-info">
        <input  id="password" type="password" required>
        <span>Password</span>
        </div>
        <p id="error"></p>

         <div class="user-info">
        <input  id="phno" type="text" required>
        <span>Mobile-No</span>
        <p id="phno-text">&#9432 please enter valid mobile number</p>
        </div>
        <input class="login-button" onclick="validName()" type="submit" value="Login">
        <script src="js/script.js"></script>
    </div>
</body>

</html>
