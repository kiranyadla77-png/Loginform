<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/singupstyle.css">
</head>
<body>
    <div class="bodycenter">
        <p class="mainheading"><b>Singup Form</b></p>
        <p class="user-p">User Name</p>
        <input class="user-button" id="username" type="text" placeholder="Username" required>

         <p class="pass-p">Password</p>
        <input class="pass-button"  id="password" type="password" placeholder="Password" required>
        <p id="error"></p>

        <p class="mb-no">Mobile-no</p>
        <input class="mb-button" id="phno" type="text" placeholder="Mobile number" required>
        <p id="phno-text">&#9432 please enter valid mobile number</p>
        <input class="login-button" onclick="validName()" type="submit" value="Login">
        <script src="js/script.js"></script>
    </div>
</body>

</html>
