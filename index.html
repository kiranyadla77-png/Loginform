<html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/LoginStyle.css">
</head>

<body>
    <div class="Div">

        <h1><b>Login Form</b></h1>

        <div class="inputBox">
            <input type="text" id="username" required>
            <span>Username</span>
        </div>

        <div class="inputBox">
            <input type="password" id="password" required>
            <span>Password</span>
        </div>
        <p id="error"></p>

        <button  class="b1" onclick="validName()">Login</button>
        <p class="forgotpassword">Forgot Password</p> &#65372;
        <button class="sing" onclick="login()">Singup</button>
        <hr>

        <button class="email-button">Login with Email</button>

    </div>   
     <script src="js/script.js"></script>
 
</body>

</html>
